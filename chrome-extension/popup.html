<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zim-Clipper</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      background-color: #0a0a0a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      border: 1px solid rgba(220, 38, 38, 0.2);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .title {
      font-size: 16px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #f87171;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fca5a5;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background-color: rgba(239, 68, 68, 0.2);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 11px;
      font-family: monospace;
      color: #94a3b8;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .success { color: #4ade80 !important; }
    .error { color: #f87171 !important; }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">Zim-Clipper (Hunter OS)</div>
  </div>
  <button id="extractBtn">Extrair Vaga para o OS</button>
  <div id="status">Aguardando no alvo...</div>

  <script src="popup.js"></script>
</body>
</html>
